<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restablecer contraseña — SkillsForIT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Inter',sans-serif;background:#0d1117;color:#f3f4f6}
:root{
  --bg:#111827;--card:#1f2937;--border:#374151;--dim:#2d3748;
  --accent:#34d399;--muted:#9ca3af;--faint:#6b7280;--red:#f87171;
  --mono:'JetBrains Mono',monospace;--r:8px;
}
.page{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 16px}
.brand{font-family:var(--mono);font-size:.9rem;font-weight:600;margin-bottom:32px;color:#f3f4f6}
.brand span{color:var(--accent)}
.card{width:100%;max-width:420px;background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.card-header{padding:24px 28px 0;border-bottom:1px solid var(--dim);padding-bottom:20px}
.card-header h1{font-family:var(--mono);font-size:1rem;font-weight:700;color:#f3f4f6;margin-bottom:6px}
.card-header p{font-size:.8rem;color:var(--muted);line-height:1.5}
.form-body{padding:24px 28px}
.field{margin-bottom:16px}
.field label{display:block;font-size:.75rem;font-weight:600;font-family:var(--mono);color:var(--muted);margin-bottom:6px;letter-spacing:.05em}
.field input{width:100%;background:#111827;border:1px solid var(--border);border-radius:var(--r);color:#f3f4f6;font-size:.88rem;padding:11px 14px;outline:none;transition:border-color .2s;font-family:'Inter',sans-serif}
.field input:focus{border-color:var(--accent)}
.field input::placeholder{color:var(--faint)}
.btn-submit{width:100%;padding:13px;background:var(--accent);color:#0d1117;font-weight:700;font-family:var(--mono);font-size:.88rem;border:none;border-radius:var(--r);cursor:pointer;transition:background .2s,transform .1s;letter-spacing:.03em}
.btn-submit:hover{background:#6ee7b7;transform:translateY(-1px)}
.footer-note{text-align:center;font-size:.75rem;color:var(--faint);padding:0 28px 20px}
.footer-note a{color:var(--accent);text-decoration:none}
.back{display:block;text-align:center;margin-top:24px;font-size:.75rem;color:var(--faint)}
.back a{color:var(--accent);text-decoration:none}
</style>
</head>
<body>
<div class="page">
  <a href="/" class="brand">Skills<span>For</span>IT</a>

  <div class="card">
    <div class="card-header">
      <h1>Restablecer contraseña</h1>
      <p>Ingresá tu email y te enviaremos un enlace para crear una nueva contraseña.</p>
    </div>
    <form method="POST" class="form-body">
      {% csrf_token %}
      <div class="field">
        <label>EMAIL</label>
        <input type="email" name="email" placeholder="tu@email.com" autofocus required>
      </div>
      <button type="submit" class="btn-submit">Enviar enlace →</button>
    </form>
    <p class="footer-note"><a href="{% url 'core:login' %}">← Volver al inicio de sesión</a></p>
  </div>

  <span class="back"><a href="/">← Volver al inicio</a></span>
</div>
</body>
</html>
