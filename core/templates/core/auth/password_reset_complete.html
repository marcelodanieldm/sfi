{% extends 'core/base.html' %}

{% block title %}Contraseña restablecida — SkillsForIT{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card auth-card--center">
        <div class="auth-status-icon auth-status-icon--success">✅</div>
        <h1>¡Contraseña actualizada!</h1>
        <p>Tu contraseña fue restablecida exitosamente. Ya podés iniciar sesión con tu nueva contraseña.</p>
        <a href="{% url 'core:login' %}" class="btn-primary btn-full" style="margin-top:1.5rem">Iniciar sesión</a>
    </div>
</div>
{% endblock %}
