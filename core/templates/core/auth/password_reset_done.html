<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Email enviado — SkillsForIT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Inter',sans-serif;background:#0d1117;color:#f3f4f6}
:root{
  --bg:#111827;--card:#1f2937;--border:#374151;--dim:#2d3748;
  --accent:#34d399;--muted:#9ca3af;--faint:#6b7280;
  --mono:'JetBrains Mono',monospace;--r:8px;
}
.page{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 16px}
.brand{font-family:var(--mono);font-size:.9rem;font-weight:600;margin-bottom:32px;color:#f3f4f6}
.brand span{color:var(--accent)}
.card{width:100%;max-width:420px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:40px 32px;text-align:center}
.icon{font-size:2.5rem;margin-bottom:20px}
.card h1{font-family:var(--mono);font-size:1rem;font-weight:700;color:#f3f4f6;margin-bottom:12px}
.card p{font-size:.85rem;color:var(--muted);line-height:1.6;margin-bottom:10px}
.hint{font-size:.75rem;color:var(--faint);margin-top:4px}
.btn{display:block;width:100%;padding:13px;background:var(--accent);color:#0d1117;font-weight:700;font-family:var(--mono);font-size:.85rem;border:none;border-radius:var(--r);cursor:pointer;text-decoration:none;text-align:center;margin-top:28px;transition:background .2s}
.btn:hover{background:#6ee7b7}
.back{display:block;text-align:center;margin-top:20px;font-size:.75rem;color:var(--faint)}
.back a{color:var(--accent);text-decoration:none}
</style>
</head>
<body>
<div class="page">
  <a href="/" class="brand">Skills<span>For</span>IT</a>

  <div class="card">
    <div class="icon">📧</div>
    <h1>¡Email enviado!</h1>
    <p>Si el email que ingresaste está registrado, recibirás un enlace para restablecer tu contraseña en los próximos minutos.</p>
    <p class="hint">Revisá también tu carpeta de spam o correo no deseado.</p>
    <a href="{% url 'core:login' %}" class="btn">Volver al inicio de sesión</a>
  </div>

  <span class="back"><a href="/">← Volver al inicio</a></span>
</div>
</body>
</html>
