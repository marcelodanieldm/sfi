<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MentorIA Chat | SkillsForIT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Inter',sans-serif;background:#0d1117;color:#f3f4f6}
:root{
  --bg:#111827;--bg2:#1f2937;--card:#374151;--border:#4b5563;--dim:#2d3748;
  --text:#f3f4f6;--muted:#9ca3af;--faint:#6b7280;
  --accent:#34d399;
  --mono:'JetBrains Mono',monospace;--r:8px;
}

/* ── Layout (header outside, app fills remaining viewport) ── */
.app{display:flex;flex-direction:column;height:calc(100vh - 52px);height:calc(100dvh - 52px)}

/* ── Tipo selector ── */
.tipo-wrap{position:relative;background:var(--bg);border-bottom:1px solid var(--dim);flex-shrink:0}
.tipo-bar{padding:10px 20px;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.tipo-bar::-webkit-scrollbar{display:none}
.tipo-btn{font-family:var(--mono);font-size:.7rem;font-weight:600;padding:9px 14px;min-height:38px;border-radius:var(--r);border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;white-space:nowrap;transition:all .2s;letter-spacing:.03em;touch-action:manipulation}
.tipo-btn:hover{border-color:var(--accent);color:var(--accent)}
.tipo-btn.active{background:var(--accent);border-color:var(--accent);color:#0d1117}
/* scroll arrows */
.sc-arr{
  position:absolute;top:50%;transform:translateY(-50%);z-index:10;
  width:30px;height:30px;display:flex;align-items:center;justify-content:center;
  background:rgba(17,24,39,.92);border:1px solid #4b5563;border-radius:50%;
  color:#9ca3af;cursor:pointer;padding:0;
  transition:color .2s,border-color .2s,opacity .2s,background .2s;
}
.sc-arr:hover{color:#34d399;border-color:#34d399;background:#111827}
.sc-arr.sc-l{left:6px}
.sc-arr.sc-r{right:6px}
.sc-arr[hidden]{display:none}
/* edge fades */
.tipo-wrap::before,.tipo-wrap::after{
  content:'';position:absolute;top:0;bottom:0;width:52px;z-index:9;pointer-events:none;transition:opacity .25s;
}
.tipo-wrap::before{left:0;background:linear-gradient(to right,var(--bg) 35%,transparent)}
.tipo-wrap::after{right:0;background:linear-gradient(to left,var(--bg) 35%,transparent)}
.tipo-wrap.fade-l-off::before{opacity:0}
.tipo-wrap.fade-r-off::after{opacity:0}

/* ── Chat area ── */
.chat-area{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px;overscroll-behavior-y:contain;-webkit-overflow-scrolling:touch}

/* ── Empty state ── */
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;color:var(--muted)}
.empty-state .icon{font-size:2.5rem;margin-bottom:16px;opacity:.5}
.empty-state h3{font-size:1rem;font-weight:600;margin-bottom:6px;color:var(--text)}
.empty-state p{font-size:.82rem;line-height:1.6;max-width:320px}

/* ── Messages ── */
.msg{display:flex;gap:10px;max-width:78%;animation:fadeIn .2s ease}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg.assistant{align-self:flex-start}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

.msg-avatar{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-family:var(--mono)}
.msg.user .msg-avatar{background:rgba(52,211,153,.15);border:1px solid rgba(52,211,153,.3);color:var(--accent)}
.msg.assistant .msg-avatar{background:var(--card);border:1px solid var(--border);color:var(--muted)}

.msg-bubble{padding:12px 16px;border-radius:12px;font-size:.85rem;line-height:1.65}
.msg.user .msg-bubble{background:var(--card);border:1px solid var(--border);border-top-right-radius:4px}
.msg.assistant .msg-bubble{background:var(--bg);border:1px solid var(--dim);border-top-left-radius:4px}
.msg-bubble p{margin-bottom:8px}
.msg-bubble p:last-child{margin-bottom:0}
.msg.assistant .msg-bubble h3{font-size:.95rem;font-weight:700;color:var(--text);margin:14px 0 6px;padding-bottom:4px;border-bottom:1px solid var(--dim)}
.msg.assistant .msg-bubble h3:first-child{margin-top:0}
.msg.assistant .msg-bubble h4{font-size:.85rem;font-weight:600;color:var(--accent);margin:10px 0 4px}
.msg.assistant .msg-bubble ul,.msg.assistant .msg-bubble ol{padding-left:18px;margin:6px 0}
.msg.assistant .msg-bubble li{margin-bottom:4px;line-height:1.55}
.msg.assistant .msg-bubble strong{color:var(--text);font-weight:600}
.msg.assistant .msg-bubble em{color:var(--muted);font-style:italic}
.msg.assistant .msg-bubble blockquote{border-left:3px solid var(--accent);margin:8px 0;padding:6px 12px;background:rgba(52,211,153,.05);border-radius:0 var(--r) var(--r) 0;color:var(--muted);font-style:italic}
.msg.assistant .msg-bubble code{font-family:var(--mono);font-size:.8rem;background:var(--dim);padding:1px 5px;border-radius:3px;color:var(--accent)}

/* ── Typing indicator ── */
.typing{align-self:flex-start;display:flex;gap:10px;align-items:flex-end}
.typing-dots{display:flex;gap:4px;padding:12px 16px;background:var(--bg);border:1px solid var(--dim);border-radius:12px;border-top-left-radius:4px}
.typing-dots span{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:bounce .9s infinite}
.typing-dots span:nth-child(2){animation-delay:.15s}
.typing-dots span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}

/* ── Input area ── */
.input-area{border-top:1px solid var(--dim);padding:12px 20px;background:var(--bg);flex-shrink:0}
.input-blocked-msg{text-align:center;font-size:.75rem;color:var(--faint);font-family:var(--mono);margin-bottom:8px;display:none}
.input-blocked-msg.visible{display:block}
.input-row{display:flex;gap:10px;align-items:flex-end}
textarea{flex:1;background:var(--card);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:'Inter',sans-serif;font-size:.88rem;line-height:1.5;padding:11px 14px;resize:none;min-height:44px;max-height:140px;transition:border-color .2s;outline:none;touch-action:manipulation}
textarea:focus{border-color:var(--accent)}
textarea:disabled{opacity:.5;cursor:not-allowed}
textarea::placeholder{color:var(--faint)}
.send-btn{width:44px;height:44px;border-radius:var(--r);background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s,transform .1s;flex-shrink:0;touch-action:manipulation}
.send-btn:hover:not(:disabled){background:#6ee7b7;transform:translateY(-1px)}
.send-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.send-btn svg{width:18px;height:18px;fill:#0d1117}

/* ── Scrollbar ── */
.chat-area::-webkit-scrollbar{width:4px}
.chat-area::-webkit-scrollbar-track{background:transparent}
.chat-area::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* ── Responsive ── */
@media(max-width:768px){.msg{max-width:88%}}
@media(max-width:600px){
  .msg{max-width:92%}
  .tipo-bar{padding:8px 12px;gap:6px}
  .chat-area{padding:12px;gap:10px}
  .input-area{padding:8px 12px 10px}
  .msg-bubble{padding:10px 13px;font-size:.83rem}
}
@media(max-width:480px){
  .msg-avatar{width:26px;height:26px;font-size:.72rem}
  .tipo-btn{font-size:.67rem;padding:8px 10px}
  textarea{font-size:.85rem;padding:10px 12px}
}
</style>
</head>
<body>

{% include 'core/partials/_nav.html' with active='mentoria' active_label='MentorIA' %}

<div class="app">

  <!-- Selector de tipo de evaluación -->
  <div class="tipo-wrap" id="tipoWrap">
    <button class="sc-arr sc-l" id="tipoL" aria-label="Anterior" tabindex="-1" hidden>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <div class="tipo-bar" id="tipoBar">
      {% for key, label in tipos %}
        <button class="tipo-btn" data-tipo="{{ key }}">{{ label }}</button>
      {% endfor %}
    </div>
    <button class="sc-arr sc-r" id="tipoR" aria-label="Siguiente" tabindex="-1" hidden>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
    </button>
  </div>

  <!-- Área de chat -->
  <div class="chat-area" id="chatArea">
    <div class="empty-state" id="emptyState">
      <div class="icon">🤖</div>
      <h3>Seleccioná un área para comenzar</h3>
      <p>MentorIA creará un escenario real y te dará feedback personalizado sobre tu respuesta.</p>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-blocked-msg" id="blockedMsg">MentorIA está generando tu evaluación...</div>
    <div class="input-row">
      <textarea id="msgInput" placeholder="Seleccioná un área de evaluación para comenzar..." rows="1" disabled></textarea>
      <button class="send-btn" id="sendBtn" disabled aria-label="Enviar">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/marked@13/marked.min.js"></script>
<script>
const CSRF = '{{ csrf_token }}';
marked.use({ breaks: true, gfm: true });

let sessionId = null;
let isLoading = false;

const chatArea   = document.getElementById('chatArea');
const emptyState = document.getElementById('emptyState');
const msgInput   = document.getElementById('msgInput');
const sendBtn    = document.getElementById('sendBtn');
const blockedMsg = document.getElementById('blockedMsg');
const tipoBar    = document.getElementById('tipoBar');

msgInput.addEventListener('input', () => {
  msgInput.style.height = 'auto';
  msgInput.style.height = Math.min(msgInput.scrollHeight, 140) + 'px';
});

msgInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (!sendBtn.disabled) doSend();
  }
});
sendBtn.addEventListener('click', doSend);

tipoBar.querySelectorAll('.tipo-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    if (isLoading) return;
    tipoBar.querySelectorAll('.tipo-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    startSession(btn.dataset.tipo);
  });
});

// ── Tipo-bar scroll arrows ────────────────────────────────────────────────
const tipoWrap = document.getElementById('tipoWrap');
const tipoL    = document.getElementById('tipoL');
const tipoR    = document.getElementById('tipoR');

function syncArrows() {
  const hasFlow = tipoBar.scrollWidth > tipoBar.clientWidth + 4;
  const atStart = tipoBar.scrollLeft < 4;
  const atEnd   = tipoBar.scrollLeft + tipoBar.clientWidth >= tipoBar.scrollWidth - 4;
  tipoL.hidden = !hasFlow || atStart;
  tipoR.hidden = !hasFlow || atEnd;
  tipoWrap.classList.toggle('fade-l-off', atStart);
  tipoWrap.classList.toggle('fade-r-off', atEnd || !hasFlow);
}

tipoL.addEventListener('click', () => tipoBar.scrollBy({ left: -160, behavior: 'smooth' }));
tipoR.addEventListener('click', () => tipoBar.scrollBy({ left: 160,  behavior: 'smooth' }));
tipoBar.addEventListener('scroll', syncArrows, { passive: true });
window.addEventListener('resize', syncArrows);
setTimeout(syncArrows, 80);

function lock() {
  isLoading = true;
  msgInput.disabled = true;
  sendBtn.disabled = true;
  blockedMsg.classList.add('visible');
}

function unlock() {
  isLoading = false;
  msgInput.disabled = false;
  sendBtn.disabled = false;
  blockedMsg.classList.remove('visible');
  msgInput.placeholder = 'Escribí tu respuesta...';
  msgInput.focus();
}

function showTyping() {
  const el = document.createElement('div');
  el.className = 'typing';
  el.id = 'typingIndicator';
  el.innerHTML = `<div class="msg-avatar">🤖</div><div class="typing-dots"><span></span><span></span><span></span></div>`;
  chatArea.appendChild(el);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function hideTyping() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function appendMessage(role, text) {
  if (emptyState) emptyState.style.display = 'none';
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const avatar = role === 'user' ? '👤' : '🤖';
  const html   = role === 'assistant'
    ? marked.parse(text)
    : `<p>${escapeHtml(text).replace(/\n/g,'<br>')}</p>`;
  div.innerHTML = `<div class="msg-avatar">${avatar}</div><div class="msg-bubble">${html}</div>`;
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}

async function startSession(tipo) {
  sessionId = null;
  chatArea.innerHTML = '';
  if (emptyState) {
    const clone = emptyState.cloneNode(true);
    clone.style.display = 'none';
    chatArea.appendChild(clone);
  }
  lock();
  msgInput.placeholder = 'MentorIA está preparando tu sesión...';
  showTyping();
  try {
    const res  = await fetch('{% url "core:mentor_ia_api_new_session" %}', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-CSRFToken': CSRF },
      body: JSON.stringify({ tipo }),
    });
    const data = await res.json();
    hideTyping();
    if (!res.ok) {
      appendMessage('assistant', '⚠️ ' + (data.error || 'Error al iniciar la sesión.'));
      return;
    }
    sessionId = data.session_id;
    appendMessage('assistant', data.message);
    unlock();
  } catch {
    hideTyping();
    appendMessage('assistant', '⚠️ Error de conexión. Intentá de nuevo.');
    msgInput.disabled = false;
    sendBtn.disabled  = false;
    blockedMsg.classList.remove('visible');
    isLoading = false;
  }
}

async function doSend() {
  if (!sessionId || isLoading) return;
  const text = msgInput.value.trim();
  if (!text) return;
  appendMessage('user', text);
  msgInput.value = '';
  msgInput.style.height = 'auto';
  lock();
  showTyping();
  try {
    const res  = await fetch(`/mentoria/api/message/${sessionId}/`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-CSRFToken': CSRF },
      body: JSON.stringify({ message: text }),
    });
    const data = await res.json();
    hideTyping();
    if (!res.ok) {
      appendMessage('assistant', '⚠️ ' + (data.error || 'Error al procesar tu mensaje.'));
    } else {
      appendMessage('assistant', data.message);
    }
    unlock();
  } catch {
    hideTyping();
    appendMessage('assistant', '⚠️ Error de conexión. Intentá de nuevo.');
    unlock();
  }
}
</script>
</body>
</html>
