<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ session.scenario.title }} — SkillsForIT Roleplay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  {% load static %}
  <link rel="stylesheet" href="{% static 'core/dist/style.css' %}">
</head>
<body style="background:#0d1117;font-family:'Inter',sans-serif">

{% include 'core/partials/_nav.html' with active='roleplay' active_label='Roleplay' %}

{{ scenario_json|json_script:"scenario-data" }}

<div id="roleplay-chat-app"
     data-session-id="{{ session.id }}"
     data-initial-bot-message="{{ initial_bot_message|escapejs }}"
     data-csrf="{{ csrf_token }}"
></div>

<script type="module" src="{% static 'core/dist/roleplay-chat.js' %}"></script>
</body>
</html>
